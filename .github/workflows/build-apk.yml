name: Build Kakao Theme APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Apply theme payload (if present)
        id: payload
        run: |
          if [ -f "theme-payload.zip" ]; then
            echo "Found theme-payload.zip, extracting into src/main/theme ..."
            rm -rf src/main/theme
            mkdir -p src/main/theme
            unzip -o theme-payload.zip -d /tmp/theme-payload
            if [ -d /tmp/theme-payload/src/main/theme ]; then
              cp -r /tmp/theme-payload/src/main/theme/. src/main/theme/
            else
              cp -r /tmp/theme-payload/. src/main/theme/
            fi

            CONFIG_PATH="/tmp/theme-payload/app-config.json"
            if [ -f "$CONFIG_PATH" ]; then
              APP_ID=$(node -e "try { const c = require('$CONFIG_PATH'); if (c.applicationId) { console.log(c.applicationId); } } catch(e) {}")
            fi
            if [ -n "$APP_ID" ] && ! [[ "$APP_ID" =~ ^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]*)+$ ]]; then
              echo "app-config.json의 applicationId 형식이 올바르지 않음: '$APP_ID' → 기본값으로 폴백"
              APP_ID=""
            fi
            if [ -z "$APP_ID" ]; then
              echo "app-config.json 없음/누락/형식오류 → 빌드 번호 기반 기본값 사용"
              APP_ID="com.kakao.talk.theme.b${{ github.run_number }}"
            else
              echo "app-config.json에서 applicationId 읽음: $APP_ID"
            fi
          else
            echo "No theme-payload.zip found, building with existing src/main/theme as-is."
            APP_ID="com.kakao.talk.theme.b${{ github.run_number }}"
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

          # theme-name.json에서 테마 이름 읽기
          THEME_NAME=""
          if [ -f "theme-name.json" ]; then
            THEME_NAME=$(node -e "try { const c = require('./theme-name.json'); if (c.themeName) { console.log(c.themeName); } } catch(e) {}")
          fi
          # 파일명에 사용할 수 없는 문자 제거
          SAFE_NAME=$(echo "$THEME_NAME" | tr -d '\\/:*?"<>|' | xargs)
          if [ -z "$SAFE_NAME" ]; then
            SAFE_NAME="kakao-theme"
          fi
          echo "theme_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
          echo "테마 이름: $SAFE_NAME"

      - name: Set unique app label for this build
        run: |
          STRINGS_FILE="src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i -E "s|(<string name=\"app_name\">)[^<]*(</string>)|\1카카오테마 빌드 ${{ github.run_number }}\2|" "$STRINGS_FILE"
            echo "Updated app_name in $STRINGS_FILE"
          else
            echo "strings.xml not found at $STRINGS_FILE, skipping app label update."
          fi
      - name: Clean apkcreate folder
        run: rm -f apkcreate/*.apk
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon \
            -PappId="${{ steps.payload.outputs.app_id }}" \
            -PbuildNumber=${{ github.run_number }}
      - name: Find APK and rename with theme name
        id: find_apk
        run: |
          # debug/release 둘 다 탐색, 못 찾으면 전체 탐색으로 폴백
          RAW_APK_PATH=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | head -n 1)
          if [ -z "$RAW_APK_PATH" ]; then
            echo "⚠️  app/build/outputs/apk 에서 못 찾음 → 전체 탐색 시도"
            RAW_APK_PATH=$(find . -path "*/build/outputs/apk/*.apk" 2>/dev/null | head -n 1)
          fi
          if [ -z "$RAW_APK_PATH" ]; then
            echo "❌ APK를 찾을 수 없습니다. Gradle 빌드 출력 경로를 확인하세요."
            exit 1
          fi
          echo "Found APK at: $RAW_APK_PATH"
          THEME_NAME="${{ steps.payload.outputs.theme_name }}"
          mkdir -p apkcreate
          RENAMED_PATH="apkcreate/${THEME_NAME}.apk"
          cp "$RAW_APK_PATH" "$RENAMED_PATH"
          echo "apk_path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"
          echo "Renamed APK to: $RENAMED_PATH"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.payload.outputs.theme_name }}-apk-${{ github.run_number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
      - name: Create release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "${{ steps.payload.outputs.theme_name }} build #${{ github.run_number }}"
          files: ${{ steps.find_apk.outputs.apk_path }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
