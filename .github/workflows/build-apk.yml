name: Build Kakao Theme APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Apply theme payload (if present)
        run: |
          if [ -f "theme-payload.zip" ]; then
            echo "Found theme-payload.zip, extracting into src/main/theme ..."
            rm -rf src/main/theme
            mkdir -p src/main/theme
            unzip -o theme-payload.zip -d /tmp/theme-payload
            if [ -d /tmp/theme-payload/src/main/theme ]; then
              cp -r /tmp/theme-payload/src/main/theme/. src/main/theme/
            else
              cp -r /tmp/theme-payload/. src/main/theme/
            fi
          else
            echo "No theme-payload.zip found, building with existing src/main/theme as-is."
          fi
      - name: Set unique app label for this build
        run: |
          STRINGS_FILE="src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i -E "s|(<string name=\"app_name\">)[^<]*(</string>)|\1카카오테마 빌드 ${{ github.run_number }}\2|" "$STRINGS_FILE"
            echo "Updated app_name in $STRINGS_FILE"
          else
            echo "strings.xml not found at $STRINGS_FILE, skipping app label update."
          fi
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon \
            -PappId="com.kakao.talk.theme.b${{ github.run_number }}" \
            -PbuildNumber=${{ github.run_number }}
      - name: Find APK and rename with build number
        id: find_apk
        run: |
          RAW_APK_PATH=$(find . -name "*.apk" | head -n 1)
          echo "Found APK at: $RAW_APK_PATH"
          RENAMED_PATH="$(dirname "$RAW_APK_PATH")/kakao-theme-build-${{ github.run_number }}.apk"
          cp "$RAW_APK_PATH" "$RENAMED_PATH"
          echo "apk_path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"
          echo "Renamed APK to: $RENAMED_PATH"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kakao-theme-apk-${{ github.run_number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
      - name: Create release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Theme APK build #${{ github.run_number }}"
          files: ${{ steps.find_apk.outputs.apk_path }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
